[[completion.keymap]]
on = [ "<Up>" ]
run = "arrow -1"
desc = "Move cursor up"

[[completion.keymap]]
on = [ "<Down>" ]
run = "arrow 1"
desc = "Move cursor down"

[[completion.keymap]]
on = [ "~" ]
run = "help"
desc = "Open help"


[help]

[[help.keymap]]
on = [ "<Esc>" ]
run = "escape"
desc = "Clear the filter, or hide the help"

[[help.keymap]]
on = [ "q" ]
run = "close"
desc = "Exit the process"

[[help.keymap]]
on = [ "<C-q>" ]
run = "close"
desc = "Hide the help"

# Navigation
[[help.keymap]]
on = [ "k" ]
run = "arrow -1"
desc = "Move cursor up"

[[help.keymap]]
on = [ "j" ]
run = "arrow 1"
desc = "Move cursor down"

[[help.keymap]]
on = [ "K" ]
run = "arrow -5"
desc = "Move cursor up 5 lines"

[[help.keymap]]
on = [ "J" ]
run = "arrow 5"
desc = "Move cursor down 5 lines"

[[help.keymap]]
on = [ "<Up>" ]
run = "arrow -1"
desc = "Move cursor up"

[[help.keymap]]
on = [ "<Down>" ]
run = "arrow 1"
desc = "Move cursor down"

[[help.keymap]]
on = [ "<S-Up>" ]
run = "arrow -5"
desc = "Move cursor up 5 lines"

[[help.keymap]]
on = [ "<S-Down>" ]
run = "arrow 5"
desc = "Move cursor down 5 lines"

# Filtering
[[help.keymap]]
on = [ "f" ]
run = "filter"
desc = "Apply a filter for the help items"
